## vim: ft=conf

# start counting windows at 1
set -g base-index 1

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g repeat-time 1000

set -g default-terminal "screen-256color"

set-option -g word-separators " -@()[]{}"

set -g mouse on
## On tmux 2.0 or below, use these instead of the above:
# set -g mouse-resize-pane   on
# set -g mouse-select-pane   on
# set -g mouse-select-window on
# set -g mouse-utf8          on

# vim navigation
setw -g mode-keys vi
# prefix + vim key to move between panes
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# prefix+r to reload tmux conf
bind-key r source-file ~/.tmux.conf

bind-key Space next-window # prefix+space -> next window
bind-key BSpace previous-window # prefix+backspace -> prev window
bind-key O last-window # prefix + o -> last used window

# Splits
bind-key v split-window -h # prefix+h 
bind-key h split-window -v # prefix+h

bind-key m copy-mode # prefix + m -> copy mode
bind-key p paste-buffer # prefix + p -> paste from tmux buffer

## 🌊 Window border design (turquoise theme)
set -g pane-border-style        "bg=default fg=colour30"    # muted teal for inactive
set -g pane-active-border-style "bg=default fg=colour45"    # bright turquoise for active

## 🌊 Status bar design
set -g status-justify left
set -g status-bg colour23       # dark teal background
set -g status-fg white
set -g status-interval 2

set -g status-right "#[fg=colour45] (#{=21:pane_title}) %H:%M %d-%b-%y"

# window status
setw -g window-status-current-format "#[fg=brightwhite]#[bg=colour33] #I#F #W "
setw -g window-status-format         "#[fg=black]#[bg=brightwhite] #I#F #W "

# window status colors
setw -g window-status-current-format "#[fg=black]#[bg=colour45] #I#F #W "    # turquoise active window
setw -g window-status-format         "#[fg=white]#[bg=colour23] #I#F #W "    # dark teal inactive
